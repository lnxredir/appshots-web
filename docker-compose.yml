name: appshots

services:
  appshots:
    build:
      context: .
      dockerfile: Dockerfile
    image: appshots:${APPSHOTS_TAG:-latest}
    container_name: appshots
    ports:
      - "${APPSHOTS_PORT:-8084}:${APPSHOTS_PORT:-8084}"
    environment:
      NODE_ENV: production
      PORT: ${APPSHOTS_PORT:-8084}
      HOST: ${APPSHOTS_HOST:-0.0.0.0}
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    init: true
    stop_grace_period: 10s
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:' + (process.env.PORT || 8084) + '/api/devices').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - appshots

networks:
  appshots:
    name: appshots
    driver: bridge
